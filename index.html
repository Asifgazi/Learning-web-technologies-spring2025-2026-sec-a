<html lang="en">
<head>
    <title>Job Portal</title>
</head>
<body>

    <h1 id="head">Job Portal</h1>

    <form>
        <input type="text" id="name" placeholder="Employer Name"><br>
        <input type="text" id="company" placeholder="Company Name"><br>
        <input type="text" id="contact" placeholder="Contact No"><br>
        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br><br>

        <input type="button" value="Register" onclick="insert()" />
        <input type="button" value="Search" onclick="search()" />
    </form>

    <br>
    <div id="result"></div>

    <script src="script.js"></script>
</body>
</html>
